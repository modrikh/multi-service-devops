- name: Update apt cache
  ansible.builtin.apt:
    update_cache: true
    cache_valid_time: 3600

- name: Install base packages
  ansible.builtin.apt:
    name:
      - curl
      - git
      - unzip
      - jq
      - ca-certificates
      - gnupg
      - lsb-release
      - apt-transport-https
      - software-properties-common
    state: present
