apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: app-base
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  project: multi-service-devops
  source:
    repoURL: https://github.com/modrikh/multi-service-devops.git
    targetRevision: main
    path: k8s/base
  destination:
    server: https://kubernetes.default.svc
    namespace: devops-app
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
