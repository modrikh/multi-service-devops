apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: app-gateway-ingress
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "3"
spec:
  project: multi-service-devops
  source:
    repoURL: https://github.com/your-org/multi-service-devops.git
    targetRevision: main
    path: k8s/gateway.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: devops-app
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
