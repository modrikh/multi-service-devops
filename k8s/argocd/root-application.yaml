apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: multi-service-devops-root
  namespace: argocd
spec:
  project: multi-service-devops
  source:
    repoURL: https://github.com/modrikh/multi-service-devops.git
    targetRevision: main
    path: k8s/argocd/apps
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
